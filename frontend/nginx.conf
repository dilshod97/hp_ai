# HP-AI nginx config — frontend + backend API bitta portda
server {
    listen 80 default_server;
    server_name _;

    # Maksimal yuklash hajmi (katta qonun fayllar uchun)
    client_max_body_size 500M;

    # Frontend static fayllar (index.html va h.k.)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy — /api/* -> hp_backend:8000
    location /api/ {
        proxy_pass http://hp_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming uchun muhim
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # Uzun ingest jarayonlari uchun katta timeout
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_connect_timeout 60s;
    }

    # API docs (Swagger)
    location /docs {
        proxy_pass http://hp_backend:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://hp_backend:8000/openapi.json;
    }
}
